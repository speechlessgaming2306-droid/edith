[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
watchPatterns = [
  "backend/**",
  "src/**",
  "public/**",
  "package.json",
  "package-lock.json",
  "requirements.txt",
  "requirements-local.txt",
  "vite.config.js",
  "index.html",
  "railway.toml"
]

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
